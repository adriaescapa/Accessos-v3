:root {

  --green-bg:  #eef8f3;

.screen{ display:none; min-height:100vh; min-height:100dvh; flex-direction:column; }

  background:var(--sb-bg);
}

.ac-date{ font-size:11px; color:rgba(255,255,255,0.45); margin-top:2px; letter-spacing:1px; text-transform:uppercase; }

.ac-body{
  flex:1; display:flex; align-items:flex-start; justify-content:center;
  padding:16px; overflow-y:auto;
}
.ac-card{
  background:#fff; border-radius:14px;
  width:100%; max-width:560px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  overflow:hidden;
}
.ac-card-hdr{
  background:var(--red); color:#fff;
  padding:16px 22px;
  display:flex; align-items:center; gap:12px;
}
.ac-card-icon{ font-size:24px; }
.ac-card-title{
  font-family:"Barlow Condensed",sans-serif;
  font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:1px;
}
.ac-card-sub{ font-size:12px; opacity:.85; margin-top:2px; }

.ac-card-body{ padding:22px; }

/* Tabs */
.ac-tabs{
  display:flex; border:2px solid var(--border); border-radius:8px;
  overflow:hidden; margin-bottom:20px;
}
.ac-tab{
  flex:1; padding:11px; text-align:center; cursor:pointer;
  font-family:"Barlow Condensed",sans-serif;
  font-size:15px; font-weight:800; text-transform:uppercase; letter-spacing:1px;
  background:var(--bg); color:var(--gray); border:none; transition:all .15s;
}
.ac-tab.active.entrada{ background:var(--green); color:#fff; }
.ac-tab.active.sortida{ background:var(--red); color:#fff; }

/* Form */
.ac-form{ display:flex; flex-direction:column; gap:14px; }
.ac-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ac-field{ display:flex; flex-direction:column; gap:5px; }
.ac-field label{
  font-size:11px; font-weight:700; color:var(--gray);
  text-transform:uppercase; letter-spacing:1px;
}
.ac-field input, .ac-field select{
  padding:12px 14px; border:2px solid var(--border); border-radius:7px;
  font-size:15px; color:var(--dark); outline:none;
  font-family:"Source Sans 3",sans-serif; transition:border-color .15s;
  background:#fff; -webkit-appearance:none;
}
.ac-field input:focus, .ac-field select:focus{ border-color:var(--red); }
.ac-field.full{ grid-column:1/-1; }

.ac-submit{
  width:100%; padding:15px; border-radius:8px; border:none;
  font-family:"Barlow Condensed",sans-serif;
  font-size:18px; font-weight:800; text-transform:uppercase; letter-spacing:2px;
  cursor:pointer; transition:all .15s; margin-top:4px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.ac-submit.entrada{ background:var(--green); color:#fff; }
.ac-submit.entrada:hover{ background:#1ea352; }
.ac-submit.sortida{ background:var(--red); color:#fff; }
.ac-submit.sortida:hover{ background:var(--red-dark); }

/* Log avui */
.ac-log-panel{
  border-top:1px solid var(--border);
  background:var(--bg);
}
.ac-log-toggle{
  padding:12px 22px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; user-select:none;
}
.ac-log-toggle-title{
  font-family:"Barlow Condensed",sans-serif;
  font-size:13px; font-weight:800; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--gray);
}
.ac-log-toggle-count{
  background:var(--red); color:#fff;
  font-size:11px; font-weight:800;
  padding:2px 8px; border-radius:10px;
}
.ac-log-list{ padding:0 22px 14px; max-height:240px; overflow-y:auto; }
.ac-log-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:6px; margin-bottom:6px;
  background:#fff; border:1px solid var(--border); font-size:13px;
  flex-wrap:wrap;
}
.ac-log-item.entrada{ border-left:4px solid var(--green); }
.ac-log-item.sortida{ border-left:4px solid var(--red); }
.ac-log-item.has-exit{ opacity:.65; }
.ac-log-badge{
  font-size:10px; font-weight:800; padding:3px 8px; border-radius:4px;
  text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; flex-shrink:0;
}
.ac-log-badge.entrada{ background:#d4f0e0; color:#0f6030; }
.ac-log-badge.sortida{ background:var(--red-mid); color:var(--red-dark); }
.ac-log-name{ font-weight:700; flex:1; min-width:100px; }
.ac-log-company{ font-size:12px; color:var(--gray); flex:1; min-width:80px; }
.ac-log-time{ font-size:12px; color:var(--gray); font-weight:600; white-space:nowrap; }
.ac-exit-btn{
  background:var(--red); color:#fff; border:none; border-radius:5px;
  padding:5px 12px; font-size:11px; font-weight:800; cursor:pointer;
  white-space:nowrap; flex-shrink:0;
}
.ac-exit-done{ font-size:11px; color:var(--green); font-weight:700; white-space:nowrap; }
.ac-empty-log{ text-align:center; color:var(--light); font-size:13px; padding:16px; }

/* Botó accés intern */
.ac-intern-btn{
  position:fixed; bottom:20px; right:20px;
  background:rgba(255,255,255,.08); color:rgba(255,255,255,.4);
  border:1px solid rgba(255,255,255,.12); border-radius:20px;
  padding:7px 16px; font-size:11px; font-weight:600;
  cursor:pointer; letter-spacing:1px; text-transform:uppercase;
  transition:all .2s; z-index:100;
}
.ac-intern-btn:hover{ background:rgba(255,255,255,.15); color:rgba(255,255,255,.8); }

/* Confirmació */
.confirm-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:500; display:none; align-items:center; justify-content:center; padding:20px;
}
.confirm-overlay.open{ display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn{ from{opacity:0} to{opacity:1} }
.confirm-box{
  background:#fff; border-radius:14px; padding:36px 28px;
  text-align:center; max-width:320px; width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.confirm-icon{ font-size:52px; margin-bottom:10px; }
.confirm-title{
  font-family:"Barlow Condensed",sans-serif;
  font-size:22px; font-weight:800; text-transform:uppercase; color:var(--dark); margin-bottom:4px;
}
.confirm-time{
  font-family:"Barlow Condensed",sans-serif;
  font-size:38px; font-weight:800; color:var(--red); line-height:1; margin:8px 0;
}
.confirm-msg{ font-size:14px; color:var(--gray); margin-bottom:22px; line-height:1.5; }
.confirm-ok{
  width:100%; padding:13px; border-radius:8px; border:none;
  font-family:"Barlow Condensed",sans-serif; font-size:16px; font-weight:800;
  text-transform:uppercase; letter-spacing:1px; cursor:pointer;
  background:var(--dark); color:#fff;
}

/* ══════════════════════════════
   PANTALLA 2 — LOGIN
══════════════════════════════ */
#screenLogin{
  background:var(--sb-bg);
  align-items:center; justify-content:center; padding:20px;
}
.login-box{
  background:#fff; border-radius:14px; width:340px; max-width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,.5); overflow:hidden;
}
.login-hdr{
  background:var(--sb-bg); border-bottom:4px solid var(--red);
  padding:24px; text-align:center;
}
.login-hdr img{ height:40px; filter:brightness(0) invert(1); }
.login-hdr-sub{
  font-family:"Barlow Condensed",sans-serif;
  font-size:12px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:rgba(255,255,255,.45); margin-top:8px;
}
.login-body{ padding:28px; display:flex; flex-direction:column; gap:16px; }
.login-title{
  font-family:"Barlow Condensed",sans-serif;
  font-size:18px; font-weight:800; text-transform:uppercase;
  letter-spacing:1px; color:var(--dark); text-align:center;
}
.login-field{ display:flex; flex-direction:column; gap:5px; }
.login-field label{
  font-size:11px; font-weight:700; color:var(--gray);
  text-transform:uppercase; letter-spacing:1px;
}
.login-field input{
  padding:12px 14px; border:2px solid var(--border); border-radius:7px;
  font-size:15px; color:var(--dark); outline:none;
  font-family:"Source Sans 3",sans-serif; transition:border-color .15s;
}
.login-field input:focus{ border-color:var(--red); }
.login-error{
  font-size:13px; color:var(--red); font-weight:600;
  text-align:center; display:none;
  background:var(--red-bg); padding:8px 12px; border-radius:6px;
}
.login-error.show{ display:block; }
.login-submit{
  width:100%; padding:13px; border-radius:8px; border:none;
  background:var(--red); color:#fff; cursor:pointer;
  font-family:"Barlow Condensed",sans-serif;
  font-size:17px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px;
}
.login-back{
  text-align:center; font-size:13px; color:var(--gray);
  cursor:pointer; text-decoration:underline; margin-top:-4px;
}

/* ══════════════════════════════
   PANTALLA 3 — HISTORIAL
══════════════════════════════ */
#screenHistorial{
  background:var(--bg); flex-direction:column;
}
.hist-topbar{
  background:var(--sb-bg); border-bottom:4px solid var(--red);
  padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.hist-topbar-left{ display:flex; align-items:center; gap:14px; }
.hist-topbar img{ height:34px; filter:brightness(0) invert(1); }
.hist-topbar-title{
  font-family:"Barlow Condensed",sans-serif;
  font-size:16px; font-weight:800; text-transform:uppercase;
  letter-spacing:1.5px; color:#fff;
}
.hist-back{
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,.1); color:rgba(255,255,255,.8);
  border:1px solid rgba(255,255,255,.15); border-radius:6px;
  padding:7px 14px; font-size:12px; font-weight:700;
  cursor:pointer; text-transform:uppercase; letter-spacing:.5px;
  white-space:nowrap;
}
.hist-body{ flex:1; overflow-y:auto; padding:20px; }

/* Filtres */
.hist-filters{
  display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center;
}
.hist-filter-input{
  flex:1; min-width:160px; padding:9px 14px;
  border:1.5px solid var(--border); border-radius:7px;
  font-size:14px; outline:none; font-family:"Source Sans 3",sans-serif;
  background:#fff;
}
.hist-filter-input:focus{ border-color:var(--red); }
.hist-filter-select{
  padding:9px 14px; border:1.5px solid var(--border); border-radius:7px;
  font-size:14px; outline:none; background:#fff; cursor:pointer;
  font-family:"Source Sans 3",sans-serif; -webkit-appearance:none;
}
.hist-stats{
  display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px;
}
.hist-stat{
  background:#fff; border:1px solid var(--border); border-radius:8px;
  padding:14px; text-align:center;
}
.hist-stat-val{
  font-family:"Barlow Condensed",sans-serif;
  font-size:30px; font-weight:800; color:var(--red); line-height:1;
}
.hist-stat-lbl{ font-size:11px; color:var(--gray); font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-top:3px; }

/* Taula registres */
.hist-card{
  background:#fff; border:1px solid var(--border); border-radius:8px; overflow:hidden;
}
.hist-card-hdr{
  padding:12px 18px; background:var(--bg); border-bottom:1px solid var(--border);
  font-family:"Barlow Condensed",sans-serif;
  font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--gray);
  display:flex; gap:20px;
}
.hist-row{
  display:flex; align-items:center; gap:12px;
  padding:11px 18px; border-bottom:1px solid var(--border);
  font-size:13px; flex-wrap:wrap;
}
.hist-row:last-child{ border-bottom:none; }
.hist-row:hover{ background:var(--red-bg); }
.hist-badge{
  font-size:10px; font-weight:800; padding:3px 8px; border-radius:4px;
  text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; flex-shrink:0;
}
.hist-badge.entrada{ background:#d4f0e0; color:#0f6030; }
.hist-badge.sortida{ background:var(--red-mid); color:var(--red-dark); }
.hist-name{ font-weight:700; flex:1; min-width:120px; }
.hist-company{ font-size:12px; color:var(--gray); flex:1; min-width:100px; }
.hist-motiu{ font-size:12px; color:var(--mid); flex:1; min-width:80px; }
.hist-time{ font-size:12px; color:var(--gray); font-weight:600; white-space:nowrap; }
.hist-date{ font-size:11px; color:var(--light); white-space:nowrap; }
.hist-pending{
  font-size:11px; background:#fef3cd; color:#856404;
  padding:2px 7px; border-radius:4px; font-weight:700; white-space:nowrap;
}
.hist-empty{
  text-align:center; padding:48px 20px; color:var(--light); font-size:14px;
}

/* Grup per dia */
.hist-day-group{ margin-bottom:20px; }
.hist-day-label{
  font-family:"Barlow Condensed",sans-serif;
  font-size:13px; font-weight:800; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--gray);
  padding:8px 0 6px; margin-bottom:8px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.hist-day-count{
  background:var(--dark); color:#fff;
  font-size:10px; padding:2px 8px; border-radius:10px;
}

@keyframes loadingAnim{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>

// ── API GOOGLE SHEETS ──
async function apiPost(payload){
  try{
    // Google Apps Script requereix URLSearchParams per evitar CORS
    const params = new URLSearchParams();
    params.append('data', JSON.stringify(payload));
    const r = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: params.toString()
    });
    const text = await r.text();
    try{ return JSON.parse(text); }
    catch(e){ return {ok:true}; }
  } catch(e){
    // Fallback: no-cors (no podem llegir la resposta però es guarda)
    try{
      await fetch(API, {
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({data: JSON.stringify(payload)}).toString()
      });
      return {ok:true};
    } catch(e2){
      console.error('API error:',e2);
      return {ok:false};
    }
  }
}

async function loadLOG(){
  showLoading(true);
  try{
    const r = await apiPost({action:'getAll'});
    if(r.ok && r.data){
      LOG = r.data.map(x=>({...x, id:Number(x.id)}));
    }
  } catch(e){
    console.error('loadLOG:',e);
  }
  showLoading(false);
  renderLogAvui();
}

function showLoading(v){
  let el = document.getElementById('loadingBar');
  if(el) el.style.display = v?'block':'none';
}

// ── RELLOTGE ──
function tickClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const dies = ['diumenge','dilluns','dimarts','dimecres','dijous','divendres','dissabte'];
  const mesos = ['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];
  const cl = document.getElementById('acClock');
  const dt = document.getElementById('acDate');
  if(cl) cl.textContent = hh+':'+mm+':'+ss;
  if(dt) dt.textContent = dies[now.getDay()]+', '+now.getDate()+' '+mesos[now.getMonth()]+' '+now.getFullYear();
}
setInterval(tickClock, 1000);
tickClock();

// ── NAVEGACIÓ ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screenHistorial'){ loadLOG().then(()=>renderHistorial()); }
}

// ── TABS ──
function setTab(t){
  currentTab = t;
  ['entrada','sortida'].forEach(x=>{
    const btn = document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1));
    btn.className = 'ac-tab'+(x===t?' active '+t:'');
  });
  const isE = t==='entrada';
  document.getElementById('acSubmitBtn').className = 'ac-submit '+t;
  document.getElementById('acSubmitIcon').textContent = isE?'✅':'👋';
  document.getElementById('acSubmitText').textContent = isE?'REGISTRAR ENTRADA':'REGISTRAR SORTIDA';
}

// ── REGISTRE ──
async function submitAcces(){
  const nom = document.getElementById('acNom').value.trim();
  const empresa = document.getElementById('acEmpresa').value.trim();
  const motiu = document.getElementById('acMotiu').value;
  const anfitrio = document.getElementById('acAnfitrio').value.trim();
  const dni = document.getElementById('acDni').value.trim();
  if(!nom){ alert('Cal indicar el nom i cognoms.'); return; }
  if(!empresa){ alert("Cal indicar l'empresa."); return; }
  if(!motiu){ alert('Cal seleccionar el motiu.'); return; }
  const now = new Date();
  const hora = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const data = now.toLocaleDateString('ca-ES');
  const entry = {
    id: Date.now(),
    nom, empresa, motiu, anfitrio, dni,
    tipus: currentTab,
    data, hora,
    horaSortida: null
  };
  // Desa a Google Sheets
  const btn = document.getElementById('acSubmitBtn');
  btn.disabled = true;
  btn.style.opacity = '0.6';
  const res = await apiPost({action:'entrada', ...entry});
  btn.disabled = false;
  btn.style.opacity = '1';
  if(!res.ok){ alert('Error en guardar el registre. Comprova la connexió.'); return; }
  LOG.unshift(entry);
  renderLogAvui();
  // Confirmació
  const isE = currentTab==='entrada';
  document.getElementById('cfIcon').textContent = isE?'✅':'👋';
  document.getElementById('cfTitle').textContent = isE?'Entrada registrada':'Sortida registrada';
  document.getElementById('cfTime').textContent = hora;
  document.getElementById('cfMsg').textContent = isE
    ? 'Benvingut/da, '+nom+'!'
    : 'Fins aviat, '+nom+'!';
  document.getElementById('confirmOverlay').classList.add('open');
  // Reset
  document.getElementById('acNom').value='';
  document.getElementById('acEmpresa').value='';
  document.getElementById('acMotiu').value='';
  document.getElementById('acAnfitrio').value='';
  document.getElementById('acDni').value='';
}

function closeConfirm(){
  document.getElementById('confirmOverlay').classList.remove('open');
}

// ── SORTIDA RÀPIDA ──
async function registrarSortida(id){
  const r = LOG.find(x=>x.id===id);
  if(!r) return;
  const now = new Date();
  r.horaSortida = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  renderLogAvui();
  await apiPost({action:'sortida', id: r.id, horaSortida: r.horaSortida});
  document.getElementById('cfIcon').textContent = '👋';
  document.getElementById('cfTitle').textContent = 'Sortida registrada';
  document.getElementById('cfTime').textContent = r.horaSortida;
  document.getElementById('cfMsg').textContent = 'Fins aviat, '+r.nom+'!';
  document.getElementById('confirmOverlay').classList.add('open');
}

// ── LOG AVUI ──
let logVisible = false;
function toggleLog(){
  logVisible = !logVisible;
  document.getElementById('acLogList').style.display = logVisible?'block':'none';
}

function renderLogAvui(){
  const avui = new Date().toLocaleDateString('ca-ES');
  const items = LOG.filter(r=>r.data===avui);
  document.getElementById('logCount').textContent = items.length;
  const el = document.getElementById('acLogList');
  if(!items.length){
    el.innerHTML='<div class="ac-empty-log">Sense registres avui</div>';
    return;
  }
  el.innerHTML = items.map(r=>{
    const isE = r.tipus==='entrada';
    const exitBtn = isE && !r.horaSortida
      ? '<button class="ac-exit-btn" onclick="registrarSortida('+r.id+')">◀ Sortida</button>'
      : isE && r.horaSortida ? '<span class="ac-exit-done">✓ Sortit</span>' : '';
    const timeStr = r.hora + (r.horaSortida?' → '+r.horaSortida:'');
    return '<div class="ac-log-item '+r.tipus+(r.horaSortida?' has-exit':'')+'">'+
      '<span class="ac-log-badge '+r.tipus+'">'+(isE?'▶ Entrada':'◀ Sortida')+'</span>'+
      '<span class="ac-log-name">'+r.nom+'</span>'+
      '<span class="ac-log-company">'+r.empresa+'</span>'+
      '<span class="ac-log-time">'+timeStr+'</span>'+
      exitBtn+
    '</div>';
  }).join('');
}

// ── LOGIN ──
function showLogin(){
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').classList.remove('show');
  showScreen('screenLogin');
  setTimeout(()=>document.getElementById('loginEmail').focus(),100);
}

function doLogin(){
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  if(USERS.some(u=>u.email===email&&u.pass===pass)){
    document.getElementById('loginError').classList.remove('show');
    showScreen('screenHistorial');
  } else {
    document.getElementById('loginError').classList.add('show');
    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
  }
}

// ── HISTORIAL ──
function renderHistorial(){
  const q = (document.getElementById('filtSearch').value||'').toLowerCase().trim();
  const tipus = document.getElementById('filtTipus').value;
  const avui = new Date().toLocaleDateString('ca-ES');

  let filtered = LOG.filter(r=>{
    const matchQ = !q || r.nom.toLowerCase().includes(q) || r.empresa.toLowerCase().includes(q) || (r.motiu||'').toLowerCase().includes(q);
    const matchT = !tipus || r.tipus===tipus;
    return matchQ && matchT;
  });

  // Stats
  document.getElementById('statTotal').textContent = LOG.length;
  document.getElementById('statAvui').textContent = LOG.filter(r=>r.data===avui).length;
  document.getElementById('statPending').textContent = LOG.filter(r=>r.tipus==='entrada'&&!r.horaSortida).length;

  const el = document.getElementById('histContent');
  if(!filtered.length){
    el.innerHTML='<div class="hist-empty">Cap registre trobat</div>';
    return;
  }

  // Agrupar per dia
  const byDay = {};
  filtered.forEach(r=>{
    if(!byDay[r.data]) byDay[r.data]=[];
    byDay[r.data].push(r);
  });

  el.innerHTML = Object.keys(byDay).map(day=>{
    const rows = byDay[day].map(r=>{
      const isE = r.tipus==='entrada';
      const timeStr = r.hora+(r.horaSortida?' → '+r.horaSortida: r.tipus==='entrada'?' <span class="hist-pending">Pend.</span>':'');
      return '<div class="hist-row">'+
        '<span class="hist-badge '+r.tipus+'">'+(isE?'▶ Entrada':'◀ Sortida')+'</span>'+
        '<span class="hist-name">'+r.nom+'</span>'+
        '<span class="hist-company">'+r.empresa+'</span>'+
        '<span class="hist-motiu">'+r.motiu+'</span>'+
        '<span class="hist-time">'+timeStr+'</span>'+
      '</div>';
    }).join('');
    return '<div class="hist-day-group">'+
      '<div class="hist-day-label"><span>'+day+'</span><span class="hist-day-count">'+byDay[day].length+' registres</span></div>'+
      '<div class="hist-card">'+rows+'</div>'+
    '</div>';
  }).join('');
}
